<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="highContrastNoise">
        <feFuncR type="linear" slope="2.5" intercept="-0.75"/>
        <feFuncG type="linear" slope="2.5" intercept="-0.75"/>
        <feFuncB type="linear" slope="2.5" intercept="-0.75"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="highContrastNoise" mode="soft-light" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="bg" cx="60%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#343850"/>
      <stop offset="100%" stop-color="#1f2133"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#bg)" filter="url(#grain)" opacity="0.30"/>
</svg>
